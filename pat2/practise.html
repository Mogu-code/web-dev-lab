<body>
    <form onsubmit="return validateform()">
        Name:<input type="text" id="name" ><br>

        Confirm pwd:<input type="password" id="conpwd"><br>
        Phone:<input type="text" id="phone"><br>
        Age:<input type="number" id="age"><br>
        Term accept:<input type="radio" id="term"><br>
        <input type="submit">
    </form>
</body>
<script>
    function validateform(){
        let n=document.getElementById("name").value;
        let em=document.getElementById("email").value;
        let pwd=document.getElementById("pwd").value;
        let confpwd=document.getElementById("conpwd").value;
        let ph=document.getElementById("phone").value;
        let ag=document.getElementById("age").value;
        let term=document.getElementById("term").checked;

        let namepattern=/^[A-Za-z ]+$/;
        if (n=="" || em==""){
            alert("cannot be empty"); return false;
        } 
        let emailpattern=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!namepattern.test(n)){ 
            alert("name must've only letters"); 
            return false;
        }
        if(!emailpattern.test(em)){
            alert("email must be only letters");
            return false;
        }
        if (pwd.length<6){
            alert("must be atleast 6");
            return false;
        }
        if (pwd!=confpwd){
            alert("must be same");
            return false;
        }
        let phonepattern=/^[0-9]{10}$/;
        if (!phonepattern.test(ph)){
            alert("must be 10 digits");
            return false;
        }
        if (ag<16){
            alert("must be more than 16")
            return false;
        }
        if(!term){
            alert ("must accept");
            return false;
        }
        alert("submitted");
        return true;

    }
</script> -->
