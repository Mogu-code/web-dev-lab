<head>
<style>
    .circle{
        width:30px;
        height: 30px;
        background-color: red;
    }
    .box{
        width:300px;
        height:300px;
        border: 2px solid black;
        position: absolute;
    }
</style>
</head>
<body>
    <div class="box"></div>
    <script>
        document.getElementById("box").onclick=function(e){
            let c=document.createElement("div");
            c.classList.add("circle");
            c.style.left=e.offsetX+"px";
c.style.top=e.offsetY+"px";
            box.appendChild(c);
        }
    </script>
</body>
